# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
# DO NOT apply this file without replacing the placeholder values.
# Replace YOUR_SCRYWATCH_API_KEY with your real API key before use.
# Alternatively, create the secret with kubectl directly:
#
#   kubectl create secret generic scrywatch-credentials \
#     --from-literal=SCRYWATCH_API_KEY=<your-key> \
#     --from-literal=SCRYWATCH_ENDPOINT=https://api.scrywatch.com \
#     --namespace observability --create-namespace
#
# !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
apiVersion: v1
kind: Secret
metadata:
  name: scrywatch-credentials
  namespace: observability
type: Opaque
stringData:
  SCRYWATCH_API_KEY: "YOUR_SCRYWATCH_API_KEY"       # TODO: replace
  SCRYWATCH_ENDPOINT: "https://api.scrywatch.com"  # TODO: replace if self-hosted
