apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-traces-config
  namespace: observability
data:
  config.yaml: |
    # ⚠️  ScryWatch does not yet support OTLP log ingest.
    #     The logs pipeline below demonstrates collection only.
    #     For production log shipping to ScryWatch, use the ScryWatch SDK directly.
    #
    # ✅  ScryWatch supports OTLP HTTP/JSON for TRACES.
    #     The traces pipeline below ships traces to ScryWatch via otlphttp.
    #
    # Required environment variables (from scrywatch-credentials Secret):
    #   SCRYWATCH_API_KEY
    #   SCRYWATCH_ENDPOINT

    receivers:
      filelog:
        include: [/var/log/pods/**/*.log]
        operators:
          - type: json_parser
            timestamp:
              parse_from: attributes.time
              layout: "%Y-%m-%dT%H:%M:%SZ"
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
      batch:
        timeout: 5s
        send_batch_size: 50

    exporters:
      debug:
        verbosity: normal
      otlphttp/scrywatch:
        endpoint: "${SCRYWATCH_ENDPOINT}/api/traces/otlp"
        headers:
          Authorization: "Bearer ${SCRYWATCH_API_KEY}"

    service:
      pipelines:
        logs:
          receivers:  [filelog]
          processors: [memory_limiter, batch]
          exporters:  [debug]
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, batch]
          exporters:  [otlphttp/scrywatch]
