apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector-traces
  namespace: observability
spec:
  selector:
    matchLabels:
      app: otel-collector-traces
  template:
    metadata:
      labels:
        app: otel-collector-traces
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317  # OTLP gRPC
              protocol: TCP
            - containerPort: 4318  # OTLP HTTP
              protocol: TCP
          envFrom:
            - secretRef:
                name: scrywatch-credentials
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            - name: varlog
              mountPath: /var/log
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-collector-traces-config
        - name: varlog
          hostPath:
            path: /var/log
