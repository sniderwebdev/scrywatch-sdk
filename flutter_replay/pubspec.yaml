name: scrywatch_replay
description: >-
  Session-replay SDK for ScryWatch: deny-by-default masking, an always-on
  PII floor, and remote-policy-driven capture for Flutter apps.
version: 0.3.0
homepage: https://scrywatch.com/guides/24-session-replay-overview
repository: https://github.com/scrywatch/sdk-flutter-replay

topics:
  - session-replay
  - monitoring
  - observability
  - privacy

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
